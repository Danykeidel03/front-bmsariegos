  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Helper para cargar CSS de forma asíncrona sin bloquear renderizado
      (function () {
        const loadCSS = (href, id) => {
          if (document.getElementById(id)) return;
          const l = document.createElement('link');
          l.id = id;
          l.rel = 'stylesheet';
          l.href = href;
          l.media = 'print';
          l.onload = function () {
            this.media = 'all';
            this.onload = null;
          };
          document.head.appendChild(l);
        };
        // Cargar CSS no crítico cuando el navegador esté idle
        if ('requestIdleCallback' in window) {
          requestIdleCallback(
            () => {
              loadCSS('/styles/non-critical.css', 'non-critical-css');
            },
            { timeout: 2000 }
          );
        } else {
          setTimeout(() => loadCSS('/styles/non-critical.css', 'non-critical-css'), 1);
        }
      })();
    </script>
  </body>
